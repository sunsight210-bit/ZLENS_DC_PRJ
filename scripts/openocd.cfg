# scripts/openocd.cfg — ZLENS_DC OpenOCD configuration
# ST-Link V3 with native DAP driver + STM32F1x target

source [find interface/stlink-dap.cfg]
source [find target/stm32f1x.cfg]

# SWO clock: 2MHz trace clock with 64MHz core clock (HSI PLL)
tpiu config internal Test/logs/swo_raw.log uart off 64000000 2000000
itm port 0 on
